<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TransDia – IR Company Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="TransDia: A comprehensive solution provider for Gemstone & Industrial Diamonds, Manufacturing, Processing, NFT, and RWA solutions (IR Company Profile)" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Noto Sans", "Apple SD Gothic Neo", sans-serif;
      line-height: 1.6;
      color: #222;
      background-color: #f5f7fb;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    header {
      background: radial-gradient(circle at top left, #4a6bff, #101840);
      color: #fff;
      padding: 32px 16px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .max-width {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 8px;
    }

    .nav-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .logo-area h1 {
      margin: 0;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .logo-sub {
      font-size: 0.8rem;
      opacity: 0.8;
    }

    .nav-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 0.85rem;
    }

    .nav-links a {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(4px);
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .nav-links a:hover {
      background: rgba(255, 255, 255, 0.18);
      transform: translateY(-1px);
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 3fr) minmax(0, 2fr);
      gap: 24px;
      align-items: center;
      padding-top: 8px;
      padding-bottom: 8px;
    }

    .hero-main-title {
      font-size: 1.9rem;
      margin: 0 0 8px;
      font-weight: 700;
    }

    .hero-sub-title {
      font-size: 0.95rem;
      opacity: 0.92;
      margin-bottom: 12px;
    }

    .hero-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .hero-tag {
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background: rgba(0, 0, 0, 0.15);
    }

    .hero-box {
      background: radial-gradient(circle at top, rgba(255, 255, 255, 0.2), rgba(0, 0, 0, 0.35));
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 0.85rem;
      border: 1px solid rgba(255, 255, 255, 0.35);
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.25);
    }

    .hero-box-title {
      font-size: 0.8rem;
      opacity: 0.85;
      margin-bottom: 4px;
    }

    .hero-box-main {
      font-weight: 600;
      margin-bottom: 6px;
    }

    .hero-box-sub {
      opacity: 0.8;
      font-size: 0.8rem;
    }

    main {
      padding: 28px 16px 40px;
    }

    section {
      margin-bottom: 32px;
    }

    section:last-of-type {
      margin-bottom: 0;
    }

    .section-card {
      background: #ffffff;
      border-radius: 18px;
      padding: 20px 18px;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
      border: 1px solid #e1e4f0;
    }

    h2.section-title {
      margin: 0 0 4px;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    h2.section-title span.badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      border: 1px solid #c7d2fe;
    }

    .section-subtitle {
      font-size: 0.8rem;
      color: #64748b;
      margin-bottom: 12px;
    }

    h3 {
      font-size: 1rem;
      margin-top: 14px;
      margin-bottom: 6px;
    }

    h4 {
      font-size: 0.95rem;
      margin-top: 10px;
      margin-bottom: 4px;
    }

    p {
      margin: 4px 0 8px;
      font-size: 0.9rem;
    }

    ul {
      margin: 4px 0 8px 1.1rem;
      padding-left: 0.5rem;
    }

    li {
      font-size: 0.9rem;
      margin-bottom: 2px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }

    .tag-chip {
      font-size: 0.75rem;
      padding: 3px 9px;
      border-radius: 999px;
      border: 1px solid #d4d4ff;
      background: #f3f4ff;
      color: #334155;
    }

    .kv-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 6px;
      margin-bottom: 4px;
      font-size: 0.9rem;
    }

    .kv-table th,
    .kv-table td {
      border-bottom: 1px solid #e5e7eb;
      padding: 4px 0;
      text-align: left;
    }

    .kv-table th {
      width: 150px;
      color: #6b7280;
      font-weight: 500;
      padding-right: 12px;
    }

    .highlight-box {
      border-radius: 12px;
      border: 1px dashed #c7d2fe;
      background: #f8fafc;
      padding: 10px 12px;
      margin-top: 8px;
      font-size: 0.85rem;
      color: #1e293b;
    }

    footer {
      padding: 16px;
      text-align: center;
      font-size: 0.8rem;
      color: #94a3b8;
    }

    @media (max-width: 800px) {
      .hero {
        grid-template-columns: minmax(0, 1fr);
      }
    }

    @media (max-width: 640px) {
      header {
        padding: 20px 12px 14px;
      }

      .hero-main-title {
        font-size: 1.5rem;
      }

      .grid-2 {
        grid-template-columns: minmax(0, 1fr);
      }

      main {
        padding: 20px 12px 28px;
      }

      .section-card {
        padding: 16px 14px;
      }
    }
  </style>
</head>

<div style="width:100%; max-width:900px; margin:0 auto;">
<iframe src="https://smartfarm-f519e.web.app/embed/timeseries"; width="100%" height="420" frameborder="0" style="border:0; display:block;"></iframe>
</div>

</body>
</html>
